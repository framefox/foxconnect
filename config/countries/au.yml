development:
  email_from: "frames@framefox.com.au"
  api_url: "http://dev.framefox.com.au:3001"
  api_base_path: "/api"
  shopify_domain: "<%= ENV['remote_shopify_domain_au'] %>"
  shopify_access_token: "<%= ENV['remote_shopify_access_token_au'] %>"
  currency: "AUD"
  country_code: "AU"
  country_name: "Australia"
  gst_rate: 0.10
  shopify_remote_store: "https://admin.shopify.com/store/framefox-au-prod/"
  xero_client_id: "<%= ENV['XERO_AU_CLIENT_ID'] %>"
  xero_client_secret: "<%= ENV['XERO_AU_CLIENT_SECRET'] %>"
  xero_tax_type: "OUTPUT"
  xero_account_code: "200"

